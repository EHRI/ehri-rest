# Configuration for import/export. These values can be overridden
# by an "application.conf" file in the Neo4j conf directory.

io {
  import {
    # default EAD language import
    defaultLang = "eng"

    # this refers to a resource file
    defaultProperties = "ead2002.properties"

    defaultLinkType = "associative"
    defaultLinkText = "Link provided by data provider."

    # delimiter for tabular records
    defaultFieldSep = ","
    defaultArraySep = "||"

    http {
      # Whether to buffer HTTP resources before XML import
      buffer = true
      # How many times to retry a failing resource
      maxRetries = 3
    }
  }

  export {
    ead {
      includeRevisions = false
    }
  }

  pids {
    # 41045 is the NAAN, p0 the shoulder
    prefix = "ark:41045/p0"
    # the length of the generated portion
    length = 10
    # PID label
    label = "EHRI Archival Resource Key"
  }
}
